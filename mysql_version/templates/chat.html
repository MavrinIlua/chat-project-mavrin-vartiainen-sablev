{% extends "base.html" %}

{% block title %}Чат 1-на-1{% endblock %}

{% block content %}

<div class="container">
    <!-- Боковая панель с пользователями -->
    <div class="users-sidebar">
        <div class="sidebar-title">Собеседники</div>
        <!-- Перебираем всех пользователей, кроме текущего -->
        {% for user in all_users %}
        <div class="user-item" onclick="selectUser({{ user.id }})" id="user-{{ user.id }}">
            <img src="https://ui-avatars.com/api/?name={{ user.name }}+{{ user.surname }}&background=random&size=40" class="user-avatar" alt="{{ user.name }}">
            <div class="user-info">
                <span class="user-name">{{ user.name }} {{ user.surname }}</span>
                <span class="user-login">{{ user.login }}</span>
            </div>
        </div>
        {% endfor %}
        <button id="logout-btn">Выйти</button>
        <button id="refresh-btn" class="refresh-btn">🔄 Обновить список</button>
    </div>

    <!-- Область чата -->
    <div class="chat-area">
        <div class="chat-header">
            <div class="greeting">{{ greeting }}, <strong>{{ current_user.name }}</strong>!</div>
            <div class="chat-header-info" id="chat-header-info">
                <!-- Будет заполняться динамически -->
            </div>
        </div>

        <div id="messages">
            <div style="text-align: center; margin-top: 80px; color: #adb5bd;">
                Загрузка...
            </div>
        </div>

        <form id="message-form">
            <input type="text" id="message-input" placeholder="Введите сообщение..." autocomplete="off">
            <button type="submit">Отправить</button>
        </form>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
    // Экранирование HTML
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    const currentUser_id = {{ current_user.id }};
    let selectedUser_id = null;
    let allUsers = [];

    // Получаем список пользователей с сервера (из переданных через Jinja)
    {% for user in all_users %}
    allUsers.push({
        id: {{ user.id }},
        name: "{{ user.name }}",
        surname: "{{ user.surname }}",
        login: "{{ user.login }}"
    });
    {% endfor %}

    const messagesDiv = document.getElementById('messages');
    const messageForm = document.getElementById('message-form');
    const messageInput = document.getElementById('message-input');
    const chatHeaderInfo = document.getElementById('chat-header-info');

    // Обновление заголовка чата
    function updateHeader() {
        if (selectedUser_id) {
            const user = allUsers.find(u => u.id == selectedUser_id);
            if (user) {
                chatHeaderInfo.innerHTML = `
                    <img src="https://ui-avatars.com/api/?name=${user.name}+${user.surname}&background=random&size=64" class="user-avatar-large" alt="${user.name}">
                    <div class="chat-header-name">${escapeHtml(user.name)} ${escapeHtml(user.surname)}</div>
                `;
                return;
            }
        }
        chatHeaderInfo.innerHTML = `<div class="chat-header-name">Выберите собеседника слева</div>`;
    }

    // Загрузка сообщений
    async function loadMessages() {
        if (!selectedUser_id) {
            messagesDiv.innerHTML = '<div style="text-align:center; margin-top:80px; color:#adb5bd;">Выберите собеседника слева</div>';
            return;
        }
        try {
            const resp = await fetch(`/get_messages?user_id=${selectedUser_id}`);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const messages = await resp.json();
            if (messages.length === 0) {
                messagesDiv.innerHTML = '<div style="text-align:center; margin-top:80px; color:#adb5bd;">Напишите первое сообщение!</div>';
            } else {
                messagesDiv.innerHTML = '';
                let lastDate = '';
                for (const msg of messages) {
                    let datePart = '', timePart = '';
                    if (msg.created_at) {
                        const parts = msg.created_at.split(' ');
                        if (parts.length >= 2) {
                            const dateParts = parts[0].split('-');
                            datePart = `${dateParts[2]}.${dateParts[1]}.${dateParts[0]}`;
                            timePart = parts[1].slice(0,5);
                        } else {
                            datePart = parts[0];
                        }
                    }
                    if (datePart && datePart !== lastDate) {
                        const divider = document.createElement('div');
                        divider.className = 'date-divider';
                        divider.textContent = datePart;
                        messagesDiv.appendChild(divider);
                        lastDate = datePart;
                    }
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `message ${msg.sender_id == currentUser_id ? 'mine' : ''}`;
                    msgDiv.innerHTML = `
                        <div class="message-meta">
                            <span class="author">${escapeHtml(msg.sender_login || msg.sender_name || '?')}</span>
                            <span>${escapeHtml(timePart)}</span>
                        </div>
                        <p class="message-text">${escapeHtml(msg.text)}</p>
                    `;
                    messagesDiv.appendChild(msgDiv);
                }
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
        } catch(e) {
            console.error('Ошибка загрузки сообщений:', e);
            messagesDiv.innerHTML = '<div style="text-align:center; margin-top:80px; color:#e53e3e;">Ошибка загрузки сообщений</div>';
        }
    }

    // Отправка сообщения
    messageForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const text = messageInput.value.trim();
        if (!text) {
            alert('Введите текст сообщения');
            return;
        }
        if (!selectedUser_id) {
            alert('Выберите собеседника из списка слева');
            return;
        }
        try {
            const resp = await fetch('/send_message', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ receiver_id: selectedUser_id, text: text })
            });
            const data = await resp.json();
            if (data.result === true) {
                messageInput.value = '';
                loadMessages();
            } else {
                alert('Ошибка: ' + (data.message || 'неизвестная ошибка'));
            }
        } catch(e) {
            console.error('Ошибка при отправке:', e);
            alert('Не удалось отправить сообщение. Проверьте соединение с сервером.');
        }
    });

    // Выбор пользователя
    window.selectUser = function(userId) {
        selectedUser_id = userId;
        // Обновить активный класс
        document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
        if (userId) {
            const userEl = document.getElementById(`user-${userId}`);
            if (userEl) userEl.classList.add('active');
        }
        updateHeader();
        loadMessages();
    };

    // Кнопки
    document.getElementById('logout-btn').onclick = () => location.href = '/logout';
    document.getElementById('refresh-btn').onclick = () => location.reload();

    // При загрузке: если есть хотя бы один пользователь, выбрать первого автоматически
    if (allUsers.length > 0) {
        selectUser(allUsers[0].id);
    } else {
        // Нет других пользователей
        messagesDiv.innerHTML = '<div style="text-align:center; margin-top:80px; color:#e53e3e;">Нет других пользователей. Зарегистрируйте второго в другом браузере.</div>';
        messageInput.disabled = true;
        messageForm.querySelector('button').disabled = true;
    }

    // Автообновление каждые 3 секунды
    setInterval(() => {
        if (selectedUser_id) loadMessages();
    }, 3000);
</script>
{% endblock %}

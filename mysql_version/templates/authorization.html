<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в ChatApp</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 420px;
        }
        h1 { margin: 0 0 24px 0; color: #1e2a3e; text-align: center; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; color: #495057; font-weight: 500; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn-submit:hover { transform: translateY(-2px); }
        .error { color: #ef4444; text-align: center; margin-bottom: 16px; }
        .switch-link { text-align: center; margin-top: 16px; color: #6c757d; }
        .switch-link a { color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1>🔐 Вход в ChatApp</h1>
        <div id="error" class="error" style="display:none;"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Логин</label>
                <input type="text" id="login" name="login" required>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn-submit">Войти</button>
        </form>
        
        <div class="switch-link">
            Нет аккаунта? <a href="/register">Зарегистрироваться</a>
        </div>
    </div>

    <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const errorDiv = document.getElementById('error');
        
        try {
            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    login: document.getElementById('login').value,
                    password: document.getElementById('password').value
                })
            });
            
            const data = await response.json();
            
            if (data.result) {
                window.location.href = '/chat';
            } else {
                errorDiv.textContent = data.message || 'Ошибка входа';
                errorDiv.style.display = 'block';
            }
        } catch (error) {
            errorDiv.textContent = 'Ошибка подключения к серверу';
            errorDiv.style.display = 'block';
        }
    });
    </script>
</body>
</html>

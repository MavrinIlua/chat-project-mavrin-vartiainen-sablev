<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация в чате</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        /* Базовые стили страницы входа — Анна заменит на красивые */
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 80px auto;
            padding: 20px;
        }
        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 12px;
            font-size: 1em;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        button {
            width: 100%;
            padding: 10px;
            font-size: 1em;
        }
    </style>
</head>
<body>

    <h2>Регистрация нового пользователя</h2>

    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}

    <form action="/register" method="post">
        <input type="text" name="nickname" placeholder="Придумайте никнейм" maxlength="30" required>
        <input type="password" name="password" placeholder="Придумайте пароль" maxlength="50" required>
        <button type="submit">Зарегистрироваться</button>
    </form>

    <p style="color: #aaa; font-size: 0.85em; margin-top: 16px;">
        Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a>
    </p>

</body>
</html>
